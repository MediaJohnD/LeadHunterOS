version: 1
description: "Production gating for daily LeadHunterOS HOT/WARM output."

hot:
  min_icp_score: 80
  min_evidence_score: 60
  min_signal_count: 20
  min_distinct_sources: 4
  require_nonempty_reason: true

warm:
  min_icp_score: 70
  min_evidence_score: 45
  min_signal_count: 8
  min_distinct_sources: 2
  require_nonempty_reason: true

daily_targets:
  hot: 10
  warm: 100

