services:
  # PostgreSQL - local database
  postgres:
    image: postgres:16-alpine
    container_name: leadhunteros_db
    environment:
      POSTGRES_DB: leadhunteros
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LeadHunterOS v2 agent
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leadhunteros_agent
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override DB host for Docker networking
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/leadhunteros
      # Lemonade runs on the host machine by default.
      LEMONADE_BASE_URL: http://host.docker.internal:13305/api/v1
    restart: unless-stopped
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:

# NOTE: Lemonade runs locally on your machine by default.
# Make sure `lemonade serve` is running before starting the agent service.
